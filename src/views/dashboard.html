<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲力橘子_招標資訊分析</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 0, 0, 0.08);
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --accent-green: #059669;
            --accent-blue: #1d4ed8;
            --accent-purple: #7c3aed;
            --font-display: 'Outfit', 'Inter', 'Noto Sans TC', sans-serif;
            --font-body: 'Inter', 'Noto Sans TC', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }


        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.06) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem; /* Satisfies C: Reduce spacing between controls card and main card */
        }

        /* Sticky Header Wrapper */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(243, 244, 246, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding-top: 2rem;
            padding-bottom: 0.3rem; /* Reduce spacing between controls-card and table */
            margin-top: -2rem; /* Offsets body padding-top */
            display: flex;
            flex-direction: column;
            gap: 0.4rem; /* Satisfies B: Reduce spacing between header and controls-card */
        }

        /* Header Style */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            /* margin-bottom removed to control spacing via sticky-header gap */
        }

        .logo-section h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #6366f1, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-section p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .logo-img {
            height: 50px;
            width: auto;
            display: block;
            border-radius: 4px;
        }

        /* Glassmorphism Button */
        .btn-sync {
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-sync::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-sync:hover::before {
            left: 100%;
        }

        .btn-sync:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        .btn-sync:active {
            transform: translateY(1px);
        }

        .btn-sync:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: rgba(79, 70, 229, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .stat-info h3 {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-info .stat-value {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
            margin-top: 0.5rem;
            color: var(--text-primary);
        }

        .stat-icon {
            width: 3.25rem;
            height: 3.25rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-total { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .stat-security { background: rgba(139, 92, 246, 0.1); color: var(--accent-purple); }
        .stat-budget { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); }
        .stat-time { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); }

        /* Filter Controls */
        .controls-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.25rem;
            padding: 1.25rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        /* Chips Tab */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.05);
            padding: 0.25rem;
            border-radius: 9999px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .tab-chip {
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .tab-chip:hover {
            color: var(--text-primary);
        }

        .tab-chip.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }

        /* Search Input */
        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
            min-width: 250px;
        }

        .search-input {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--card-border);
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .search-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            pointer-events: none;
        }

        /* Main Data Display */
        .data-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            padding: 0.75rem 0.8rem;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--card-border);
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
        }

        th:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .sort-indicator {
            margin-left: 0.35rem;
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.75rem;
            opacity: 0.5;
        }

        th.active-sort {
            color: var(--primary);
        }

        th.active-sort .sort-indicator {
            opacity: 1;
        }

        td {
            padding: 0.75rem 0.8rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            vertical-align: middle;
            white-space: nowrap;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr {
            transition: var(--transition);
        }

        tr:hover td {
            background-color: rgba(0, 0, 0, 0.015);
        }

        /* Specific Column Styles */
        .td-agency {
            font-weight: 500;
            color: var(--text-primary);
            min-width: 10.5em;
            max-width: 12em;
            word-break: break-all;
            white-space: normal;
        }

        .td-title {
            font-weight: 600;
            min-width: 12em;
            max-width: 18em;
            word-break: break-all;
            white-space: normal;
        }

        .td-title-content {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.5rem;
            width: 100%;
        }

                .pcc-search-link {
            color: #4f46e5;
            text-decoration: underline;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            display: inline-block;
            vertical-align: middle;
        }
        .pcc-search-link:hover {
            color: var(--accent-purple);
        }

        .td-date {
            font-family: var(--font-display);
            color: var(--text-secondary);
        }

        .td-budget {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--text-primary);
        }

        .badge-source {
            display: inline-flex;
            padding: 0.25rem 0.65rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-acebidx { background: rgba(99, 102, 241, 0.1); color: #4f46e5; border: 1px solid rgba(99, 102, 241, 0.15); }
        .badge-pcc { background: rgba(16, 185, 129, 0.1); color: #059669; border: 1px solid rgba(16, 185, 129, 0.15); }
        .badge-taiwanbuying { background: rgba(249, 115, 22, 0.1); color: #f97316; border: 1px solid rgba(249, 115, 22, 0.15); }

        .btn-go {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 0.5rem;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .btn-go:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateX(2px);
        }

        /* Loading & Empty State */
        .loading-state, .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .spinner {
            width: 3rem;
            height: 3rem;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Spin sync icon animation */
        .spin-icon {
            animation: spin 1.2s infinite linear;
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--primary);
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            color: var(--text-primary);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            z-index: 1100;
            transform: translateY(150%);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 5px solid var(--primary);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Mobile view optimizations */
        .mobile-card-list {
            display: none;
            flex-direction: column;
            gap: 1rem;
            padding: 1.25rem;
        }

        .mobile-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .mobile-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .mobile-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .mobile-details {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.5rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .mobile-label {
            font-weight: 500;
            color: rgba(0, 0, 0, 0.45);
        }

        /* Button Recipient */
        .btn-recipient {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            transition: var(--transition);
        }

        .btn-recipient:hover {
            background: rgba(0, 0, 0, 0.09);
            border-color: rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
        }

        .btn-recipient:active {
            transform: translateY(1px);
        }

        /* Recipient Modal Overlay & Card styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.open .modal-card {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9fafb;
        }

        .modal-header h2 {
            font-family: var(--font-display);
            font-size: 1.35rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.75rem;
            cursor: pointer;
            line-height: 1;
            transition: var(--transition);
        }

        .btn-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Recipient Form */
        #recipient-form .form-row {
            display: flex;
            align-items: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-width: 180px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group input {
            background: #ffffff;
            border: 1px solid var(--card-border);
            padding: 0.65rem 0.85rem;
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.65rem 1.5rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            height: 38px;
            font-family: var(--font-body);
        }

        .btn-submit:hover {
            background: var(--accent-purple);
            transform: translateY(-1px);
        }

        .btn-cancel {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            padding: 0.65rem 1.25rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            height: 38px;
            font-family: var(--font-body);
        }

        .btn-cancel:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        /* Recipient Table */
        .recipient-table-wrapper {
            max-height: 230px;
            overflow-y: auto;
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            background: #ffffff;
        }

        .recipient-table {
            width: 100%;
            border-collapse: collapse;
        }

        .recipient-table th, .recipient-table td {
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--card-border);
        }

        .recipient-table th {
            background: #f9fafb;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .recipient-table tr:hover td {
            background-color: rgba(0, 0, 0, 0.01);
        }

        .recipient-table tr:last-child td {
            border-bottom: none;
        }

        .btn-action-edit, .btn-action-delete {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            transition: var(--transition);
        }

        .btn-action-edit {
            color: var(--primary);
        }
        .btn-action-edit:hover {
            background: rgba(79, 70, 229, 0.08);
        }

        .btn-action-delete {
            color: #ef4444;
        }
        .btn-action-delete:hover {
            background: rgba(239, 68, 68, 0.08);
        }

        .recipient-empty {
            padding: 2.5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .logo-section p {
                display: none;
            }
            .sticky-header {
                padding-top: 1rem;
                margin-top: -1rem;
                gap: 0.3rem;
                padding-bottom: 0.2rem;
            }
            .controls-card {
                flex-direction: column;
                align-items: stretch;
            }
            .search-wrapper {
                display: none !important;
            }
            table {
                display: none;
            }
            .mobile-card-list {
                display: flex;
            }
            .logo-section h1 {
                font-size: 1.85rem;
            }
            .logo-img {
                height: 38px;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            #sync-btn, #recipient-btn {
                display: none !important;
            }
        }

        /* Status Navigation Tabs */
        .status-tabs-container {
            display: flex;
            gap: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.1rem;
            margin-top: 0.25rem;
            margin-bottom: 0.1rem;
        }

        .status-tab {
            background: none;
            border: none;
            padding: 0.35rem 0.5rem 0.6rem 0.5rem;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .status-tab:hover {
            color: var(--text-primary);
        }

        .status-tab.active {
            color: var(--primary);
        }

        .status-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
            border-radius: 9999px;
            box-shadow: 0 2px 10px rgba(79, 70, 229, 0.3);
        }

                /* Notes Column Styles */
        .notes-cell {
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            min-height: 2em;
            display: block;
            border-radius: 4px;
            padding: 4px;
            transition: background-color 0.2s;
            word-break: break-all;
            white-space: normal;
            width: 10em;
            max-width: 10em;
            box-sizing: border-box;
        }
        .notes-cell:hover {
            background-color: rgba(99, 102, 241, 0.05);
        }
        .notes-placeholder {
            color: rgba(0, 0, 0, 0.25);
            font-style: italic;
        }
        .notes-textarea {
            width: 100%;
            border: 1px solid var(--primary);
            border-radius: 4px;
            padding: 4px;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }
        .notes-link {
            color: #4f46e5;
            text-decoration: underline;
            font-weight: 500;
        }
        
        /* Management Button Styles */
        .management-actions {
            display: inline-flex;
            gap: 0.15rem;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.88rem;
            padding: 3px 4px;
            border-radius: 4px;
            transition: background-color 0.2s, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-action:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        .btn-pin {
            color: #f59e0b;
        }
        .btn-pin.unpinned {
            opacity: 0.35;
        }
        .btn-pin.unpinned:hover {
            opacity: 0.7;
        }
        .btn-edit {
            color: #3b82f6;
        }
        .btn-remove {
            color: #ef4444;
        }
        .btn-lock {
            color: #3b82f6;
        }
        .btn-lock.unlocked {
            opacity: 0.35;
        }
        .btn-lock.unlocked:hover {
            opacity: 0.7;
        }
    </style>
</head>

    <script>
        let currentStatusTab = 'active'; // active, tracked

        function setStatusTab(status) {
            currentStatusTab = status;
            document.getElementById('status-active').classList.toggle('active', status === 'active');
            document.getElementById('status-tracked').classList.toggle('active', status === 'tracked');
            updateStatistics();
            applyFilterAndSort();
        }

        let rawTenders = [];
        let filteredTenders = [];
        let currentFilter = 'all'; // all, info, security
        let sortField = 'date';    // date, budget
        let sortOrder = 'desc';    // desc, asc

        // Format currency for display
        function formatCurrency(num) {
            if (num === 0) return '未公開或未填';
            return 'NT$ ' + num.toLocaleString('zh-TW');
        }

        // Wrap text every N characters
        function wrapText(text, limit) {
            if (!text) return '';
            let res = '';
            for (let i = 0; i < text.length; i += limit) {
                res += text.substring(i, i + limit) + '<br>';
            }
            if (res.endsWith('<br>')) {
                res = res.substring(0, res.length - 4);
            }
            return res;
        }

        // Fetch data on page load
        async function fetchTenders() {
            showLoader(true);
            try {
                const response = await fetch('/api/tenders');
                if (!response.ok) throw new Error('API 請求失敗');
                rawTenders = await response.json();
                
                updateStatistics();
                applyFilterAndSort();
            } catch (err) {
                console.error(err);
                showToast('❌ 讀取資料失敗，請重新整理');
            } finally {
                showLoader(false);
            }
        }

        // Helper to convert plain text urls to clickable links
        function linkify(text) {
            if (!text) return "";
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" class="notes-link">${url} 🔗</a>`;
            });
        }

        // Inline edit notes logic
        function startEditNotes(event, cell, idx) {
            if (event.target.tagName === 'A' || event.target.tagName === 'TEXTAREA') return;
            
            const tender = filteredTenders[idx];
            const currentNotes = tender.notes || '';
            
            const textarea = document.createElement('textarea');
            textarea.className = 'notes-textarea';
            textarea.value = currentNotes;
            textarea.rows = 2;
            
            cell.innerHTML = '';
            cell.appendChild(textarea);
            textarea.focus();
            
            textarea.onblur = async function() {
                const newNotes = textarea.value.trim();
                cell.innerHTML = newNotes ? linkify(newNotes) : '<span class="notes-placeholder">點擊輸入備註...</span>';
                
                // Update reference
                tender.notes = newNotes;
                
                if (newNotes !== currentNotes) {
                    await saveTenderUpdate({
                        uids: tender.uids,
                        notes: newNotes
                    });
                }
            };
            
            textarea.onkeydown = function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    textarea.blur();
                }
            };
        }

        // Update statistics and tab counts
        function updateStatistics() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Get tenders based on current status tab (active / tracked)
            const targetTenders = rawTenders.filter(t => {
                if (t.is_removed === 1) return false;
                if (currentStatusTab === 'active') {
                    if (t.end_date) {
                        const end = new Date(t.end_date.replace(/-/g, '/'));
                        if (end < today) return false;
                    }
                } else if (currentStatusTab === 'tracked') {
                    if (t.is_locked !== 1) return false;
                }
                return true;
            });

            // Count unique groups
            function getMergedCountForFilter(filterFn) {
                const filtered = filterFn ? targetTenders.filter(filterFn) : targetTenders;
                const keys = new Set();
                for (const t of filtered) {
                    keys.add(`${t.agency}::${t.title}`);
                }
                return keys.size;
            }

            const allCount = getMergedCountForFilter(null);
            
            const infoCount = getMergedCountForFilter(t => 
                t.title.includes('資訊') && !t.title.includes('資安') && !t.title.includes('資訊安全') && !t.title.includes('資通安全')
            );
            
            const securityCount = getMergedCountForFilter(t => 
                (t.title.includes('資安') || t.title.includes('資訊安全')) && !t.title.includes('資通安全')
            );
            
            const infosecCount = getMergedCountForFilter(t => 
                t.title.includes('資通安全')
            );

            // Update Tab button texts with counts
            document.getElementById('tab-all').innerText = `全部 (${allCount})`;
            document.getElementById('tab-info').innerText = `資訊類 (${infoCount})`;
            document.getElementById('tab-security').innerText = `資安類 (${securityCount})`;
            document.getElementById('tab-infosec').innerText = `資通安全 (${infosecCount})`;
            
            // Find latest created_at from database
            let lastSync = null;
            if (rawTenders.length > 0) {
                const dates = rawTenders.map(t => new Date(t.created_at.replace(' ', 'T') + 'Z'));
                lastSync = new Date(Math.max(...dates));
            }
            
            // Compare with localStorage lastSyncTime
            const localSyncStr = localStorage.getItem('lastSyncTime');
            if (localSyncStr) {
                const localSync = new Date(localSyncStr);
                if (!lastSync || localSync > lastSync) {
                    lastSync = localSync;
                }
            }
            
            if (lastSync) {
                document.getElementById('stat-time-val').innerText = lastSync.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
            } else {
                document.getElementById('stat-time-val').innerText = '尚未同步';
            }
        }

        // Apply filter, search, sort, and duplicate merge to raw data
        function applyFilterAndSort() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // 1. Filter based on status tab (active / tracked)
            let result = rawTenders.filter(t => {
                if (t.is_removed === 1) return false;
                if (currentStatusTab === 'active') {
                    if (t.end_date) {
                        const end = new Date(t.end_date.replace(/-/g, '/'));
                        if (end < today) return false;
                    }
                } else if (currentStatusTab === 'tracked') {
                    if (t.is_locked !== 1) return false;
                }
                return true;
            });
            
            // 2. Filter by tab category
            if (currentFilter === 'info') {
                result = result.filter(t => t.title.includes('資訊') && !t.title.includes('資安') && !t.title.includes('資訊安全') && !t.title.includes('資通安全'));
            } else if (currentFilter === 'security') {
                result = result.filter(t => (t.title.includes('資安') || t.title.includes('資訊安全')) && !t.title.includes('資通安全'));
            } else if (currentFilter === 'infosec') {
                result = result.filter(t => t.title.includes('資通安全'));
            }
            
            // 3. Search query filter
            if (searchQuery) {
                result = result.filter(t => 
                    t.title.toLowerCase().includes(searchQuery) || 
                    t.agency.toLowerCase().includes(searchQuery)
                );
            }
            
            // 4. Merge duplicate rows (identical agency and title)
            const groups = {};
            for (const t of result) {
                const key = `${t.agency}::${t.title}`;
                if (!groups[key]) {
                    groups[key] = [];
                }
                groups[key].push(t);
            }
            
            const mergedResult = [];
            for (const key in groups) {
                const group = groups[key];
                
                // Sort group items so that the primary (pinned or newest or higher budget) is chosen
                group.sort((a, b) => {
                    if (a.is_pinned !== b.is_pinned) return b.is_pinned - a.is_pinned;
                    if (a.publish_date !== b.publish_date) return b.publish_date.localeCompare(a.publish_date);
                    return b.budget - a.budget;
                });
                
                const primary = group[0];
                
                // Combine sources
                const sources = group.map(t => ({
                    source: t.source,
                    url: t.url,
                    uid: t.uid
                }));
                
                // Take first non-empty case number
                let case_number = "";
                for (const t of group) {
                    if (t.case_number) {
                        case_number = t.case_number;
                        break;
                    }
                }
                
                // Take latest end date
                let end_date = "";
                for (const t of group) {
                    if (t.end_date && (!end_date || t.end_date > end_date)) {
                        end_date = t.end_date;
                    }
                }
                
                // Take max budget
                const maxBudget = Math.max(...group.map(t => t.budget || 0));
                const budget_text = maxBudget > 0 ? maxBudget.toLocaleString('zh-TW') + "元" : "未公開或未填";
                
                // Pinned if any in the group is pinned
                const is_pinned = group.some(t => t.is_pinned === 1) ? 1 : 0;
                // Locked if any in the group is locked
                const is_locked = group.some(t => t.is_locked === 1) ? 1 : 0;
                
                // Take first non-empty notes
                let notes = "";
                for (const t of group) {
                    if (t.notes) {
                        notes = t.notes;
                        break;
                    }
                }
                
                mergedResult.push({
                    uids: group.map(t => t.uid),
                    agency: primary.agency,
                    title: primary.title,
                    case_number,
                    publish_date: primary.publish_date,
                    end_date,
                    budget: maxBudget,
                    budget_text,
                    is_pinned,
                    is_locked,
                    notes,
                    sources
                });
            }
            
            // 5. Sort the final merged biddings list
            mergedResult.sort((a, b) => {
                // Pinned always goes first
                if (a.is_pinned !== b.is_pinned) {
                    return b.is_pinned - a.is_pinned;
                }
                
                // If both are pinned, order by publish date descending
                if (a.is_pinned === 1) {
                    return b.publish_date.localeCompare(a.publish_date);
                }
                
                // Regular sorting
                if (sortField === 'date') {
                    const cmp = a.publish_date.localeCompare(b.publish_date);
                    return sortOrder === 'desc' ? -cmp : cmp;
                } else if (sortField === 'budget') {
                    const valA = a.budget || 0;
                    const valB = b.budget || 0;
                    return sortOrder === 'desc' ? valB - valA : valA - valB;
                }
                return 0;
            });
            
            filteredTenders = mergedResult;
            renderData();
        }

        // Sorting trigger
        function toggleSort(field) {
            const thDate = document.getElementById('th-date');
            const thBudget = document.getElementById('th-budget');
            const indicatorDate = document.getElementById('indicator-date');
            const indicatorBudget = document.getElementById('indicator-budget');

            if (sortField === field) {
                // Toggle order
                sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            } else {
                sortField = field;
                sortOrder = 'desc'; // default on new field is descending
            }

            // Update headers class styling
            thDate.className = sortField === 'date' ? 'active-sort' : '';
            thBudget.className = sortField === 'budget' ? 'active-sort' : '';

            // Update indicators text
            indicatorDate.innerText = sortField === 'date' ? (sortOrder === 'desc' ? '▼' : '▲') : '↕';
            indicatorBudget.innerText = sortField === 'budget' ? (sortOrder === 'desc' ? '▼' : '▲') : '↕';

        // Sync Trigger
        async function triggerSync() {
            const syncBtn = document.getElementById('sync-btn');
            const syncIcon = document.getElementById('sync-icon');
            const syncText = document.getElementById('sync-text');

            syncBtn.disabled = true;
            syncIcon.classList.add('spin-icon');
            syncText.innerText = '同步中，請稍候...';
            showToast('🔄 開始同步招標公告資訊...', '🚀');

            try {
                const response = await fetch('/api/sync', { method: 'POST' });
                if (!response.ok) throw new Error('同步失敗');
                const result = await response.json();
                
                // Save sync time to localStorage
                if (result.syncTime) {
                    localStorage.setItem('lastSyncTime', result.syncTime);
                } else {
                    localStorage.setItem('lastSyncTime', new Date().toISOString());
                }
                
                if (result.newCount && result.newCount > 0) {
                    showToast(`✅ 同步完成！新增了 ${result.newCount} 筆新標案，已發送郵件通知`, '🎉');
                } else {
                    showToast('ℹ️ 同步完成！目前無更新的資料', 'ℹ️');
                }
                await fetchTenders(); // Refresh
            } catch (err) {
                console.error(err);
                showToast('❌ 同步失敗，請稍後再試', '⚠️');
            } finally {
                syncBtn.disabled = false;
                syncIcon.classList.remove('spin-icon');
                syncText.innerText = '立即同步資料';
            }
        }

        async function fetchRecipients() {
            try {
                const response = await fetch('/api/recipients');
                if (!response.ok) throw new Error('無法載入收件人');
                recipients = await response.json();
                renderRecipients();

        function renderRecipients() {
            const tbody = document.getElementById('recipient-list-body');
            const emptyEl = document.getElementById('recipient-empty');
            tbody.innerHTML = '';

            if (recipients.length === 0) {
                emptyEl.style.display = 'block';
                return;
            }
            emptyEl.style.display = 'none';

            recipients.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${escapeHtml(r.name)}</td>
                    <td>${escapeHtml(r.email)}</td>
                    <td style="text-align: center;">
                        <button class="btn-action-edit" onclick="editRecipient(${r.id}, '${escapeQuote(r.name)}', '${escapeQuote(r.email)}')">✏️</button>
                        <button class="btn-action-delete" onclick="deleteRecipient(${r.id})">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function escapeQuote(str) {
            return str.replace(/'/g, "\\'");
        }

        async function handleRecipientSubmit(event) {
            event.preventDefault();
            const idInput = document.getElementById('recipient-id');
            const nameInput = document.getElementById('recipient-name');
            const emailInput = document.getElementById('recipient-email');
            const submitBtn = document.getElementById('recipient-submit-btn');

            const id = idInput.value;
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();

            if (!name || !email) return;

            submitBtn.disabled = true;

            const isEdit = id !== '';
            const url = isEdit ? `/api/recipients/${id}` : '/api/recipients';
            const method = isEdit ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || '儲存失敗');
                }

                showToast(isEdit ? '✅ 收件人更新成功！' : '✅ 成功新增收件人！', '🎉');
                resetRecipientForm();
                await fetchRecipients();
            } catch (err) {
                console.error(err);
                showToast(`❌ ${err.message}`, '⚠️');
            } finally {
                submitBtn.disabled = false;
            }
        }

            document.getElementById('recipient-name').value = name;
            document.getElementById('recipient-email').value = email;

            document.getElementById('recipient-cancel-btn').style.display = 'inline-block';

            document.getElementById('recipient-email').value = '';
            
            document.getElementById('recipient-submit-btn').innerText = '新增';
            document.getElementById('recipient-cancel-btn').style.display = 'none';

                if (!response.ok) throw new Error('刪除失敗');

        // API calls for tenders management
        async function saveTenderUpdate(payload) {
            try {
                const response = await fetch('/api/tenders/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error('更新失敗');
                
                // Update local dataset and UI
                await fetchTenders();
                showToast('💾 儲存成功！', '👍');
            } catch (err) {
                console.error(err);
                showToast('❌ 儲存失敗，請重試', '⚠️');
            }
        }

        async function togglePin(idx) {
            const t = filteredTenders[idx];
            const isPinned = t.is_pinned === 1 ? 0 : 1;
            await saveTenderUpdate({ uids: t.uids, is_pinned: isPinned });
        }

        async function toggleLock(idx) {
            const t = filteredTenders[idx];
            const willLock = t.is_locked !== 1;
            if (willLock) {
                if (confirm('是否確定鎖定此標案？鎖定後將會加入「追蹤中」清單。')) {
                    await saveTenderUpdate({ uids: t.uids, is_locked: 1 });
                }
            } else {
                if (confirm('是否確定解除鎖定？解除後將從「追蹤中」清單移除。')) {
                    await saveTenderUpdate({ uids: t.uids, is_locked: 0 });
                }
            }
        }

        async function removeTender(idx) {
            const t = filteredTenders[idx];
            if (confirm('是否確定移除此標案？確認後將不再顯示在清單列表中。')) {
                await saveTenderUpdate({ uids: t.uids, is_removed: 1 });
            }
        }

        function openEditTenderModal(idx) {
            const tender = filteredTenders[idx];
            
            // Set modal dynamic header (Agency on line 1, Title on line 2)
            document.getElementById('edit-modal-agency').innerText = `✏️ ${tender.agency}`;
            document.getElementById('edit-modal-title').innerText = tender.title;

            document.getElementById('edit-t-uids').value = JSON.stringify(tender.uids);
            document.getElementById('edit-t-case-number').value = tender.case_number || '';
            document.getElementById('edit-t-publish-date').value = tender.publish_date || '';
            document.getElementById('edit-t-end-date').value = tender.end_date || '';
            document.getElementById('edit-t-budget').value = tender.budget || '';
            
            // Build source URL inputs
            const container = document.getElementById('edit-t-urls-container');
            container.innerHTML = '<h3 style="font-size: 1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.75rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.25rem;">修改來源連結</h3>';
            
            tender.sources.forEach(s => {
                const div = document.createElement('div');
                div.className = 'form-group';
                div.style.marginBottom = '1rem';
                div.innerHTML = `
                    <label for="edit-url-${s.uid}">${s.source} 連結網址</label>
                    <input type="url" id="edit-url-${s.uid}" value="${s.url}" style="width: 100%;" required>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('edit-tender-modal').classList.add('open');
        }

        function closeEditTenderModal() {
            document.getElementById('edit-tender-modal').classList.remove('open');
        }

        async function handleEditTenderSubmit(event) {
            event.preventDefault();
            const uids = JSON.parse(document.getElementById('edit-t-uids').value);
            const case_number = document.getElementById('edit-t-case-number').value.trim();
            const publish_date = document.getElementById('edit-t-publish-date').value.trim();
            const end_date = document.getElementById('edit-t-end-date').value.trim();
            const budgetVal = document.getElementById('edit-t-budget').value;
            const budget = budgetVal ? parseInt(budgetVal, 10) : 0;
            
            const urls = {};
            uids.forEach(uid => {
                const input = document.getElementById(`edit-url-${uid}`);
                if (input) {
                    urls[uid] = input.value.trim();
                }
            });
            
            closeEditTenderModal();
            
            await saveTenderUpdate({
                uids,
                case_number,
                publish_date,
                end_date,
                budget,
                urls
            });
        }

        // POST query search to Government Procurement website
        function searchPCC(idx) {
            const tender = filteredTenders[idx];
            
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://web.pcc.gov.tw/prkms/tender/common/basic/readTenderBasic';
            form.target = '_blank';
            
            const inputs = {
                'tenderName': tender.title,
                'firstSearch': 'true',
                'searchType': 'basic',
                'pageSize': '15'
            };
            
            for (const [key, value] of Object.entries(inputs)) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = value;
                form.appendChild(input);
            }
            
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', fetchTenders);
    </script>
</body>
</html>
