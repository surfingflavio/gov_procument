<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招標資訊分析 - 管理後台</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #131a26;
            --bg-card: #1c2536;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #f97316; /* Gamania Orange */
            --accent-hover: #ea580c;
            --border: #2d3748;
            --success: #10b981;
            --error: #ef4444;
            --admin-badge: #3b82f6;
            --user-badge: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            margin: 0 auto;
        }

        /* Glassmorphism Auth Card Container */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .auth-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .auth-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .auth-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #ffffff;
            width: 100%;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: var(--border);
        }

        .btn-danger {
            background-color: var(--error);
            color: #ffffff;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .alert {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--error);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 1.5rem;
            text-align: left;
            display: none;
        }

        /* Dashboard Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-logo h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-logo span {
            color: var(--accent);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .username {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        /* Panel Content */
        .panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
        }

        /* Table Sizing */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            background-color: var(--bg-secondary);
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 9999px;
            text-transform: uppercase;
        }

        .badge-admin {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--admin-badge);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .badge-user {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--user-badge);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-enabled {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-disabled {
            background-color: rgba(156, 163, 175, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(156, 163, 175, 0.2);
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 6px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .btn-icon:hover {
            background-color: var(--border);
        }

        /* Modal Overlays */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateY(-20px);
            transition: transform 0.25s;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .modal-header h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        /* Toasts */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            font-size: 0.95rem;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.active {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            border-left-color: var(--success);
        }

        .toast-error {
            border-left-color: var(--error);
        }

        .toast-icon {
            font-size: 1.15rem;
        }

        /* Helper styles */
        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="auth-container">
        <div class="auth-card">
            <h2>招標資訊分析</h2>
            <p>管理後台登入</p>
            <div id="login-error" class="alert"></div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">帳號 (電子郵件)</label>
                    <input type="email" id="login-email" class="form-control" placeholder="example@gamania.com" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">密碼</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••" required autocomplete="current-password">
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary" style="margin-top: 1rem;">
                    <span>登入</span>
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN ADMIN DASHBOARD -->
    <div id="admin-dashboard" class="container" style="display: none;">
        <header>
            <div class="header-logo">
                <h1>🍊 招標資訊 <span>管理後台</span></h1>
            </div>
            <div class="user-info">
                <span class="username">管理者: <strong id="admin-user-display" style="color: var(--text-primary);">admin</strong></span>
                <button class="btn btn-secondary" onclick="handleLogout()" style="padding: 0.4rem 0.8rem; font-size: 0.88rem;">
                    <span>🚪 登出</span>
                </button>
            </div>
        </header>

        <main>
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">👥 使用者帳號與權限管理</h2>
                    <div style="display: flex; gap: 0.75rem;">
                        <button class="btn btn-secondary" id="send-test-email-btn" onclick="sendTestEmail()" style="width: auto; padding: 0.5rem 1rem; font-size: 0.88rem; border-color: var(--border);">
                            <span>✉️ 發送測試信</span>
                        </button>
                        <button class="btn btn-primary" onclick="openAddUserModal()" style="width: auto; padding: 0.5rem 1rem; font-size: 0.88rem;">
                            <span>➕ 新增使用者</span>
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 60px;">ID</th>
                                <th>使用者名稱</th>
                                <th>帳號 (Email)</th>
                                <th style="width: 120px; text-align: center;">更新通知</th>
                                <th style="width: 120px;">角色權限</th>
                                <th style="width: 120px; text-align: center;">操作管理</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <!-- Populated dynamically via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- ADD/EDIT USER MODAL -->
    <div id="user-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">新增使用者</h3>
                <button class="modal-close" onclick="closeUserModal()">&times;</button>
            </div>
            <div id="modal-error" class="alert"></div>
            <form onsubmit="handleUserSubmit(event)">
                <input type="hidden" id="modal-user-id">
                <div class="form-group">
                    <label for="modal-username">使用者名稱</label>
                    <input type="text" id="modal-username" class="form-control" required placeholder="例如：張小明">
                </div>
                <div class="form-group">
                    <label for="modal-email">帳號 (電子郵件)</label>
                    <input type="email" id="modal-email" class="form-control" required placeholder="example@gamania.com">
                </div>
                <div class="form-group">
                    <label for="modal-password" id="modal-password-label">密碼</label>
                    <input type="password" id="modal-password" class="form-control" placeholder="請輸入密碼">
                    <small id="password-help" style="display: none; font-size: 0.78rem; color: var(--text-secondary); margin-top: 0.25rem; display: block;">
                        若不修改密碼，請保持空白。
                    </small>
                </div>
                <div class="form-group">
                    <label for="modal-role">角色權限</label>
                    <select id="modal-role" class="form-control" required>
                        <option value="user">使用者 (User)</option>
                        <option value="admin">管理者 (Admin)</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem;">
                    <input type="checkbox" id="modal-receive-notifications" style="width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer;">
                    <label for="modal-receive-notifications" style="margin-bottom: 0; cursor: pointer; user-select: none;">接收更新通知郵件</label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeUserModal()">取消</button>
                    <button type="submit" class="btn btn-primary" style="width: auto;">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast">
        <span id="toast-icon" class="toast-icon">ℹ️</span>
        <span id="toast-message">提示訊息</span>
    </div>

    <script>
        // Global State
        let currentUser = null;
        let usersList = [];

        // UI Elements
        const loginScreen = document.getElementById('login-screen');
        const adminDashboard = document.getElementById('admin-dashboard');
        const adminUserDisplay = document.getElementById('admin-user-display');
        const userTableBody = document.getElementById('user-table-body');
        const loginError = document.getElementById('login-error');

        // Modal Elements
        const userModal = document.getElementById('user-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalUserId = document.getElementById('modal-user-id');
        const modalUsername = document.getElementById('modal-username');
        const modalEmail = document.getElementById('modal-email');
        const modalPassword = document.getElementById('modal-password');
        const modalPasswordLabel = document.getElementById('modal-password-label');
        const modalRole = document.getElementById('modal-role');
        const modalError = document.getElementById('modal-error');
        const passwordHelp = document.getElementById('password-help');

        // Page Load Initializer
        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
        });

        // 1. Session Auth Check
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                if (data.authenticated && data.user.role === 'admin') {
                    currentUser = data.user;
                    adminUserDisplay.textContent = currentUser.username;
                    loginScreen.style.display = 'none';
                    adminDashboard.style.display = 'block';
                    fetchUsers();
                } else {
                    showLogin();
                }
            } catch (err) {
                showLogin();
            }
        }

        function showLogin() {
            currentUser = null;
            loginScreen.style.display = 'flex';
            adminDashboard.style.display = 'none';
        }

        // 2. Login Handler
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const submitBtn = document.getElementById('login-btn');
            
            loginError.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.querySelector('span').textContent = '登入中...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || '登入失敗');
                }

                showToast('🔑 登入成功！', 'success');
                checkAuth();
            } catch (err) {
                loginError.textContent = err.message;
                loginError.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('span').textContent = '登入';
            }
        }

        // 3. Logout Handler
        async function handleLogout() {
            if (!confirm('是否確定登出後台？')) return;
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                showToast('🚪 已成功登出！', 'success');
                showLogin();
            } catch (err) {
                showToast('登出發生錯誤', 'error');
            }
        }

        // 4. Fetch Users List (Admin Only)
        async function fetchUsers() {
            try {
                const res = await fetch('/api/users');
                if (res.status === 401) {
                    showLogin();
                    return;
                }
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '無法取得使用者清單');
                
                usersList = data;
                renderUsersTable();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // 5. Render Users Table
        function renderUsersTable() {
            if (usersList.length === 0) {
                userTableBody.innerHTML = `<tr><td colspan="6" class="text-center" style="color: var(--text-secondary); padding: 2rem;">目前無任何使用者</td></tr>`;
                return;
            }

            userTableBody.innerHTML = usersList.map(user => {
                const roleText = user.role === 'admin' ? '管理者' : '使用者';
                const badgeClass = user.role === 'admin' ? 'badge-admin' : 'badge-user';
                
                const notifText = user.receive_notifications === 1 ? '開啟' : '關閉';
                const notifClass = user.receive_notifications === 1 ? 'badge-enabled' : 'badge-disabled';
                
                return `
                    <tr>
                        <td>${user.id}</td>
                        <td style="font-weight: 500;">${escapeHtml(user.username)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td style="text-align: center;"><span class="badge ${notifClass}">${notifText}</span></td>
                        <td><span class="badge ${badgeClass}">${roleText}</span></td>
                        <td class="text-center">
                            <div class="actions-cell" style="justify-content: center;">
                                <button class="btn-icon" onclick="openEditUserModal(${user.id})" title="編輯">✏️</button>
                                <button class="btn-icon" onclick="handleDeleteUser(${user.id})" title="刪除" style="color: var(--error)">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 6. Modal Openers
        function openAddUserModal() {
            modalError.style.display = 'none';
            modalTitle.textContent = '➕ 新增使用者';
            modalUserId.value = '';
            modalUsername.value = '';
            modalEmail.value = '';
            modalPassword.value = '';
            modalPassword.required = true;
            modalPasswordLabel.textContent = '密碼';
            passwordHelp.style.display = 'none';
            modalRole.value = 'user';
            document.getElementById('modal-receive-notifications').checked = true;
            
            userModal.classList.add('active');
        }

        function openEditUserModal(userId) {
            const user = usersList.find(u => u.id === userId);
            if (!user) return;

            modalError.style.display = 'none';
            modalTitle.textContent = '✏️ 編輯使用者';
            modalUserId.value = user.id;
            modalUsername.value = user.username;
            modalEmail.value = user.email;
            modalPassword.value = '';
            modalPassword.required = false; // Optional in edit mode
            modalPasswordLabel.textContent = '密碼 (選填)';
            passwordHelp.style.display = 'block';
            modalRole.value = user.role;
            document.getElementById('modal-receive-notifications').checked = user.receive_notifications === 1;
            
            userModal.classList.add('active');
        }

        function closeUserModal() {
            userModal.classList.remove('active');
        }

        // 7. CRUD Submit Handler
        async function handleUserSubmit(e) {
            e.preventDefault();
            const id = modalUserId.value;
            const username = modalUsername.value.trim();
            const email = modalEmail.value.trim();
            const password = modalPassword.value;
            const role = modalRole.value;
            const receive_notifications = document.getElementById('modal-receive-notifications').checked ? 1 : 0;

            modalError.style.display = 'none';

            // Basic checks
            if (!username || !email || !role) {
                showModalError('請填寫所有必填欄位');
                return;
            }

            const payload = { username, email, role, receive_notifications };
            if (password && password.trim() !== '') {
                payload.password = password;
            }

            const method = id ? 'PUT' : 'POST';
            const endpoint = id ? `/api/users/${id}` : '/api/users';

            try {
                const res = await fetch(endpoint, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '儲存失敗');

                showToast(id ? '✨ 使用者修改成功！' : '🎉 使用者新增成功！', 'success');
                closeUserModal();
                fetchUsers();
            } catch (err) {
                showModalError(err.message);
            }
        }

        // 8. Delete Handler
        async function handleDeleteUser(userId) {
            const user = usersList.find(u => u.id === userId);
            if (!user) return;

            if (currentUser && currentUser.email === user.email) {
                showToast('❌ 無法刪除自己目前登入的帳號', 'error');
                return;
            }

            if (!confirm(`確定要刪除使用者「${user.username}」嗎？此操作無法還原。`)) {
                return;
            }

            try {
                const res = await fetch(`/api/users/${userId}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '刪除失敗');

                showToast('🗑️ 使用者已成功刪除！', 'success');
                fetchUsers();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Helpers
        function showModalError(msg) {
            modalError.textContent = msg;
            modalError.style.display = 'block';
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMsg = document.getElementById('toast-message');
            
            toast.className = 'toast';
            if (type === 'success') {
                toast.classList.add('toast-success');
                toastIcon.textContent = '✅';
            } else if (type === 'error') {
                toast.classList.add('toast-error');
                toastIcon.textContent = '❌';
            } else {
                toastIcon.textContent = 'ℹ️';
            }
            
            toastMsg.textContent = message;
            toast.classList.add('active');
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 9. Send Test Email Function
        async function sendTestEmail() {
            const btn = document.getElementById('send-test-email-btn');
            const originalText = btn.innerHTML;
            
            if (!confirm('是否要向目前所有已開啟「更新通知」的使用者發送測試信？')) return;
            
            btn.disabled = true;
            btn.innerHTML = '<span>⏳ 傳送中...</span>';
            
            try {
                const response = await fetch('/api/test-email', {
                    method: 'POST'
                });
                
                const data = await response.json();
                if (response.status === 401) {
                    showLogin();
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(data.error || '傳送失敗');
                }
                
                showToast('🎉 測試信已順利送出給所有開啟通知的使用者！', 'success');
            } catch (err) {
                console.error(err);
                showToast(`❌ 傳送測試信失敗: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
